services:
  - type: web
    name: study-reminder
    runtime: java
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: mvn -DskipTests package
    startCommand: java -jar target/study-reminder-backend-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # Optional: lock down CORS if you ever serve frontend separately.
      # If you serve frontend from this backend (default), you can set this
      # to the same Render URL after first deploy, or leave it unset.
      - key: FRONTEND_ORIGIN
        sync: false
